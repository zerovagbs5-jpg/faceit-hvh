<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FACEIT.CC | PRIVATE NETWORK</title>
    <style>
        :root {
            --accent: #ff4e00;
            --bg: #050505;
            --panel: #0a0a0a;
            --border: #1a1a1a;
            --text: #e1e1e1;
            --dim: #555;
        }

        * { box-sizing: border-box; outline: none; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 80px; background: var(--panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 30px 0;
            z-index: 100;
        }
        .nav-item {
            width: 45px; height: 45px; margin-bottom: 25px;
            border-radius: 8px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: 0.3s; filter: grayscale(1); opacity: 0.4;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 78, 0, 0.1); filter: grayscale(0); opacity: 1;
            border: 1px solid var(--accent);
        }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-bar {
            height: 65px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 30px;
            justify-content: space-between; background: var(--panel);
        }

        .view-content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }

        /* CARDS */
        .card {
            background: #0d0d0d; border: 1px solid var(--border);
            border-radius: 4px; padding: 30px; position: relative;
        }

        /* MATCHMAKING BOX */
        .mm-box { text-align: center; max-width: 500px; margin: 50px auto; }
        .lvl-icon { width: 100px; height: 100px; margin: 0 auto 20px; transition: transform 0.5s; }
        .btn-play {
            background: var(--accent); color: #fff; border: none;
            padding: 15px 60px; font-weight: 800; letter-spacing: 2px;
            cursor: pointer; text-transform: uppercase; border-radius: 2px;
            box-shadow: 0 0 20px rgba(255, 78, 0, 0.2);
        }
        .btn-play:disabled { background: #222; box-shadow: none; cursor: wait; }

        /* SEARCH OVERLAY */
        .searching-status { 
            display: none; margin-top: 25px; font-size: 11px; color: var(--accent);
            text-transform: uppercase; letter-spacing: 3px; animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* AUTH FORMS */
        .auth-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000; display: flex;
            align-items: center; justify-content: center;
        }
        .auth-card { width: 350px; background: var(--panel); border: 1px solid var(--border); padding: 40px; }
        .auth-card h2 { color: var(--accent); font-size: 14px; margin-bottom: 30px; letter-spacing: 2px; }
        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 12px; color: #fff; margin-bottom: 15px; font-size: 13px;
        }
        input:focus { border-color: var(--accent); }

        /* CHAT */
        .chat-container { height: 400px; background: #000; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 20px; overflow-y: auto; font-size: 13px; }
        .msg { margin-bottom: 10px; border-left: 2px solid var(--accent); padding-left: 10px; }
        .msg b { color: var(--accent); margin-right: 5px; }

        /* NOTIFICATIONS */
        #notification {
            position: fixed; bottom: 30px; right: 30px; padding: 15px 30px;
            background: var(--accent); color: #fff; font-weight: bold;
            display: none; z-index: 9999; border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="notification">Матч найден!</div>

<div id="auth-view" class="auth-wrapper">
    <div class="auth-card" id="reg-form">
        <h2>REGISTRATION</h2>
        <input type="text" id="r-login" placeholder="Username">
        <input type="password" id="r-pass" placeholder="Password">
        <input type="text" id="r-nick" placeholder="Nickname">
        <input type="text" id="r-invite" placeholder="Invite Key">
        <button class="btn-play" style="width:100%" onclick="app.register()">Join Network</button>
        <p style="font-size: 10px; text-align: center; color: #444; margin-top: 15px; cursor: pointer;" onclick="app.toggleAuth()">Already have an account? Log in</p>
    </div>

    <div class="auth-card" id="login-form" style="display:none;">
        <h2>AUTHORIZATION</h2>
        <input type="text" id="l-login" placeholder="Username">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn-play" style="width:100%" onclick="app.login()">Log In</button>
    </div>
</div>

<div id="app-view" style="display:none; width: 100%; height: 100%;">
    <div class="sidebar">
        <div class="nav-item active" onclick="app.view('home')">🎮</div>
        <div class="nav-item" onclick="app.view('chat')">💬</div>
        <div class="nav-item" onclick="app.view('stats')">📈</div>
    </div>

    <div class="main">
        <div class="top-bar">
            <div style="font-weight: 900; letter-spacing: 2px;">FACEIT<span style="color:var(--accent)">.CC</span></div>
            <div id="user-header" style="font-size: 11px;">
                <span id="h-nick" style="color:var(--accent)">-</span> 
                [ ELO: <span id="h-elo">0</span> ] 
                [ LVL: <span id="h-lvl">0</span> ]
            </div>
        </div>

        <div class="view-content">
            <div id="v-home" class="view">
                <div class="card mm-box">
                    <img id="main-lvl-img" src="https://back.faceit.com/s3/faceit-stats/images/elo-levels/level1.png" class="lvl-icon">
                    <h1 style="margin:0; font-size: 24px; letter-spacing: 5px;">RANKED</h1>
                    <p style="color:#444; font-size: 12px; margin-bottom: 30px;">5v5 COMPETITIVE MATCHMAKING</p>
                    <button id="play-btn" class="btn-play" onclick="app.startQueue()">Start Search</button>
                    <div id="search-label" class="searching-status">Finding opponents...</div>
                </div>
            </div>

            <div id="v-chat" class="view" style="display:none;">
                <div class="card">
                    <h3>LIVE COMMUNITY CHAT</h3>
                    <div class="chat-container">
                        <div class="chat-msgs" id="chat-box">
                            <div class="msg"><b>Система:</b> Добро пожаловать в закрытую сеть FACEIT.CC.</div>
                        </div>
                        <div style="padding:15px; border-top:1px solid var(--border); display:flex;">
                            <input type="text" id="chat-input" placeholder="Введите сообщение..." style="margin:0; flex:1; border-radius:0;">
                            <button class="btn-play" style="padding:10px 20px; border-radius:0;" onclick="app.sendMsg()">></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="v-stats" class="view" style="display:none;">
                <div class="card">
                    <h3>PLAYER STATISTICS</h3>
                    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px;">
                        <div style="background:#000; padding:20px; border:1px solid var(--border);">
                            <div style="color:var(--dim); font-size: 10px;">MATCHES</div>
                            <div id="s-matches" style="font-size: 24px;">0</div>
                        </div>
                        <div style="background:#000; padding:20px; border:1px solid var(--border);">
                            <div style="color:var(--dim); font-size: 10px;">WINRATE</div>
                            <div id="s-wr" style="font-size: 24px;">0%</div>
                        </div>
                        <div style="background:#000; padding:20px; border:1px solid var(--border);">
                            <div style="color:var(--dim); font-size: 10px;">ELO</div>
                            <div id="s-elo" style="font-size: 24px;">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const app = {
        user: null,

        toggleAuth() {
            document.getElementById('reg-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        },

        async register() {
            const data = {
                login: document.getElementById('r-login').value,
                password: document.getElementById('r-pass').value,
                nickname: document.getElementById('r-nick').value,
                invite: document.getElementById('r-invite').value
            };
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert("Success! Now log in.");
                this.toggleAuth();
            } else {
                const err = await res.json();
                alert(err.error);
            }
        },

        async login() {
            const login = document.getElementById('l-login').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ login, password: document.getElementById('l-pass').value })
            });
            if(res.ok) {
                const data = await res.json();
                this.user = { login, ...data.userData };
                this.renderProfile();
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'flex';
            } else {
                alert("Invalid Login/Pass");
            }
        },

        view(name) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('v-'+name).style.display = 'block';
            event.currentTarget.classList.add('active');
        },

        renderProfile() {
            document.getElementById('h-nick').innerText = this.user.nickname;
            document.getElementById('h-elo').innerText = this.user.elo;
            document.getElementById('h-lvl').innerText = this.user.level;
            document.getElementById('main-lvl-img').src = `https://back.faceit.com/s3/faceit-stats/images/elo-levels/level${this.user.level}.png`;
            
            // Stats page
            document.getElementById('s-matches').innerText = this.user.matches;
            document.getElementById('s-elo').innerText = this.user.elo;
            const wr = this.user.matches > 0 ? Math.round((this.user.wins / this.user.matches) * 100) : 0;
            document.getElementById('s-wr').innerText = wr + "%";
        },

        async startQueue() {
            const btn = document.getElementById('play-btn');
            const label = document.getElementById('search-label');
            btn.disabled = true;
            label.style.display = 'block';

            const res = await fetch('/api/find-match', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ login: this.user.login })
            });
            
            const data = await res.json();
            btn.disabled = false;
            label.style.display = 'none';

            // Show result
            this.user = { ...this.user, ...data.newStats };
            this.renderProfile();
            
            const notify = document.getElementById('notification');
            notify.innerText = data.win ? `Победа! +${data.eloGain} ELO` : `Поражение! ${data.eloGain} ELO`;
            notify.style.background = data.win ? "#00ff44" : "#ff4444";
            notify.style.display = 'block';
            setTimeout(() => notify.style.display = 'none', 4000);
        },

        sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg"><b>${this.user.nickname}:</b> ${input.value}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;
        }
    }
</script>
</body>
</html>
