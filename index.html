<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACEIT.CC | PRIVATE</title>
    <style>
        :root {
            --bg: #050505;
            --container: #0a0a0a;
            --accent: #ff4a22; 
            --border: #151515;
            --text-dim: #555;
            --white: #d1d1d1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Tahoma', sans-serif; /* Более "читтерский" шрифт */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* SNOW */
        .snow-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .flake { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; top: -20px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* COMPACT CARD */
        .main-card {
            position: relative;
            z-index: 10;
            width: 320px; /* Уменьшили размер квадрата */
            background: var(--container);
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* TOP DECORATIVE LINE */
        .top-line {
            height: 2px;
            background: linear-gradient(90deg, #ff4a22 0%, #802511 100%);
        }

        .card-content { padding: 25px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .brand { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
        .brand span { color: var(--accent); }
        .version { font-size: 9px; color: var(--text-dim); }

        /* INPUTS */
        .group { margin-bottom: 15px; }
        label {
            display: block;
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 10px;
            color: #fff;
            font-size: 11px;
            outline: none;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus { border-color: var(--accent); }

        /* BUTTON */
        .action-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 74, 34, 0.3);
        }

        /* SYSTEM STATUS AREA (Добавляем детали как на скринах софтов) */
        .stats-area {
            margin-top: 20px;
            background: #070707;
            border: 1px solid var(--border);
            padding: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-bottom: 5px;
        }

        .stat-label { color: var(--text-dim); }
        .stat-value { color: #55ff55; } /* Зеленый статус */

        .footer-note {
            font-size: 8px;
            color: #333;
            text-align: center;
            margin-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="snow-layer" id="snow"></div>

    <div class="main-card">
        <div class="top-line"></div>
        <div class="card-content">
            
            <div class="header">
                <div class="brand">FACEIT<span>.CC</span></div>
                <div class="version">BUILD v1.0.4</div>
            </div>

            <form action="/api/register" method="POST">
                <div class="group">
                    <label>User Identity</label>
                    <input type="text" name="nickname" placeholder="Nickname" required>
                </div>

                <div class="group">
                    <label>Module / Software</label>
                    <input type="text" name="soft" placeholder="Current soft">
                </div>

                <button type="submit" class="action-btn">Initialize Session</button>
            </form>

            <div class="stats-area">
                <div class="stat-row">
                    <span class="stat-label">Authentication</span>
                    <span class="stat-value">Success</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">System Status</span>
                    <span class="stat-value" style="color: #55ff55;">Undetected</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Active Users</span>
                    <span class="stat-value" style="color: var(--white);">1,248</span>
                </div>
            </div>

            <div class="footer-note">Welcome back, user. Stay safe.</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('snow');
        for (let i = 0; i < 40; i++) {
            const flake = document.createElement('div');
            flake.className = 'flake';
            const size = Math.random() * 3 + 1 + 'px';
            flake.style.width = size; flake.style.height = size;
            flake.style.left = Math.random() * 100 + 'vw';
            flake.style.animationDuration = Math.random() * 5 + 3 + 's';
            flake.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(flake);
        }
    </script>
</body>
</html>
